name: CI

on:
  push:
    branches: [ main, feature/*, numeric/*, goalpost/* ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Install Rust 1.96.0
        run: rustup toolchain install 1.96.0 --profile minimal --component clippy,rustfmt

      - name: Verify Code Formatting
        run: cargo +1.96.0 fmt --all -- --check

      - name: Run Clippy Quality Gate
        run: cargo +1.96.0 clippy --locked --workspace --all-targets -- -D warnings

      - name: Run Deterministic Math Tests
        run: cargo +1.96.0 test --locked --workspace --all-targets

  wasm-check:
    name: WebAssembly Compile Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Install Rust 1.96.0
        run: rustup toolchain install 1.96.0 --profile minimal --target wasm32-unknown-unknown

      - name: Verify WebAssembly Portability
        run: |
          cargo +1.96.0 check --locked -p bunny-num -p bunny-linalg -p bunny-geom -p bunny-contract -p bunny-query -p bunny-broadphase -p bunny-mesh --target wasm32-unknown-unknown

  wasm-test:
    name: WebAssembly Headless Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Install Rust 1.96.0
        run: rustup toolchain install 1.96.0 --profile minimal --target wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa
        with:
          version: 'v0.14.0'

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'

      - name: Run Headless WebAssembly Tests
        env:
          RUSTUP_TOOLCHAIN: 1.96.0
        run: |
          wasm-pack test --node crates/bunny-num --locked
          wasm-pack test --node crates/bunny-linalg --locked
          wasm-pack test --node crates/bunny-geom --locked
          wasm-pack test --node crates/bunny-query --locked
          wasm-pack test --node crates/bunny-broadphase --locked
          wasm-pack test --node crates/bunny-mesh --locked
