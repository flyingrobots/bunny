name: CI

on:
  push:
    branches: [ main, feature/*, numeric/*, goalpost/* ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.80.1
        uses: dtolnay/rust-toolchain@1.80.1
        with:
          components: clippy, rustfmt

      - name: Verify Code Formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy Quality Gate
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run Deterministic Math Tests
        run: cargo test --workspace --all-targets

  wasm-check:
    name: WebAssembly Compile Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.80.1
        uses: dtolnay/rust-toolchain@1.80.1
        with:
          targets: wasm32-unknown-unknown

      - name: Verify WebAssembly Portability
        run: |
          cargo check -p bunny-num -p bunny-linalg -p bunny-geom -p bunny-contract -p bunny-query -p bunny-broadphase -p bunny-mesh --target wasm32-unknown-unknown

  wasm-test:
    name: WebAssembly Headless Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.80.1
        uses: dtolnay/rust-toolchain@1.80.1
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: 'v0.14.0'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Headless WebAssembly Tests
        run: |
          wasm-pack test --node crates/bunny-num
          wasm-pack test --node crates/bunny-linalg
          wasm-pack test --node crates/bunny-geom
          wasm-pack test --node crates/bunny-query
          wasm-pack test --node crates/bunny-broadphase
          wasm-pack test --node crates/bunny-mesh
