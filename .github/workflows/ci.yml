name: CI

on:
  push:
    branches: [ main, feature/*, numeric/* ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Verify Code Formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy Quality Gate
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run Deterministic Math Tests
        run: cargo test --workspace --all-targets

  wasm-check:
    name: WebAssembly Compile Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Verify WebAssembly Portability
        run: |
          cargo check -p bunny-num -p bunny-linalg -p bunny-geom -p bunny-contract --target wasm32-unknown-unknown
