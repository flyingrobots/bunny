name: Code Dojo

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: code-dojo-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  dojo-ubuntu:
    name: Dojo / Ubuntu x64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Show toolchain
        run: rustup show

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked --version 0.18.9

      - name: Run Code Dojo
        run: cargo run --locked -p xtask -- code-dojo --all --ci

  determinism-matrix:
    name: Determinism / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-26, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Show target facts
        run: |
          rustc -Vv
          cargo -V

      - name: Test deterministic behavior
        run: cargo test --locked --workspace --all-targets --all-features

      - name: Verify deterministic receipts
        run: cargo run --locked -p xtask -- code-dojo-determinism --enforce

  wasm-headless:
    name: WebAssembly / Headless Node
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa
        with:
          version: 'v0.14.0'

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Run headless WebAssembly tests
        env:
          RUSTUP_TOOLCHAIN: 1.96.0
        run: |
          wasm-pack test --node crates/bunny-num --locked
          wasm-pack test --node crates/bunny-linalg --locked
          wasm-pack test --node crates/bunny-geom --locked
          wasm-pack test --node crates/bunny-contract --locked
          wasm-pack test --node crates/bunny-query --locked
          wasm-pack test --node crates/bunny-broadphase --locked
          wasm-pack test --node crates/bunny-mesh --locked
          wasm-pack test --node crates/bunny-codec --locked
